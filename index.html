<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Setlist</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#161616;--surface:#1e1e1e;--border:#2e2e2e;--dim:#888;
      --amber:#f5a623;--white:#ffffff;--green:#3ddc97;
      --font-d:'Lato',sans-serif;--font-m:'IBM Plex Mono',monospace;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{min-height:100%;background:var(--bg);color:var(--white);font-family:var(--font-m);}

    /* ── HOME ── */
    #home{display:block;}
    #song-page{display:none;}

    .site-header{
      padding:40px 24px 0;display:flex;flex-direction:column;align-items:center;gap:6px;
      border-bottom:1px solid var(--border);padding-bottom:28px;
    }
    .site-title{font-family:var(--font-d);font-size:clamp(2.2rem,6vw,3.8rem);font-weight:700;letter-spacing:-.02em;color:var(--white);}
    .site-sub{font-size:.6rem;letter-spacing:.35em;color:var(--dim);text-transform:uppercase;}

    /* SEARCH */
    .search-wrap{padding:20px 24px;max-width:680px;margin:0 auto;width:100%;}
    .search-input{
      width:100%;padding:14px 18px;border-radius:10px;
      background:var(--surface);border:1px solid var(--border);
      color:var(--white);font-family:var(--font-m);font-size:1rem;
      outline:none;transition:border-color .2s;
    }
    .search-input:focus{border-color:#333;}
    .search-input::placeholder{color:#888;}

    /* STATS */
    .stats{text-align:center;font-size:.65rem;letter-spacing:.15em;color:#999;padding:0 24px 16px;text-transform:uppercase;}

    /* SONG LIST */
    .song-list{max-width:680px;margin:0 auto;padding:0 24px 60px;display:flex;flex-direction:column;gap:2px;}
    .song-item{
      display:flex;align-items:center;justify-content:space-between;
      padding:14px 16px;border-radius:8px;cursor:pointer;
      border:1px solid transparent;transition:all .12s;
      background:transparent;gap:12px;
    }
    .song-item:hover{background:var(--surface);border-color:var(--border);}
    .song-item:active{transform:scale(.99);}
    .song-left{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0;}
    .song-title{font-family:var(--font-d);font-size:1.15rem;font-weight:400;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .song-artist{font-size:.72rem;letter-spacing:.05em;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .song-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
    .song-key{font-size:.65rem;font-weight:700;color:var(--amber);background:#1a1200;border:1px solid #332200;border-radius:5px;padding:2px 7px;}
    .song-capo{font-size:.58rem;color:var(--dim);}
    .song-status{width:6px;height:6px;border-radius:50%;background:var(--border);}
    .song-status.has-lyrics{background:var(--green);}

    .no-results{text-align:center;padding:60px 24px;color:var(--dim);font-size:.8rem;letter-spacing:.1em;}

    /* ── SONG PAGE ── */
    .song-header{
      padding:20px 24px 20px;border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:16px;position:sticky;top:0;
      background:rgba(13,13,13,.95);backdrop-filter:blur(12px);z-index:10;
    }
    .back-btn{
      background:none;border:1px solid var(--border);color:var(--dim);
      border-radius:8px;padding:8px 12px;cursor:pointer;font-family:var(--font-m);
      font-size:.65rem;letter-spacing:.1em;transition:all .15s;white-space:nowrap;flex-shrink:0;
    }
    .back-btn:hover{border-color:#444;color:var(--white);}
    .song-header-info{flex:1;min-width:0;}
    .song-page-title{font-family:var(--font-d);font-size:clamp(1.2rem,4vw,1.8rem);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .song-page-artist{font-size:.6rem;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;}

    /* TOOLBAR */
    .toolbar{
      padding:12px 24px;border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:10px;flex-wrap:wrap;
      background:var(--surface);
    }
    .tool-label{font-size:.55rem;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;}
    .toggle-chords{
      padding:6px 14px;border-radius:20px;border:1px solid var(--border);
      background:var(--bg);color:var(--dim);font-family:var(--font-m);
      font-size:.65rem;cursor:pointer;transition:all .15s;letter-spacing:.05em;
    }
    .toggle-chords.active{background:#001a00;color:var(--green);border-color:#005500;}
    .transpose-wrap{display:flex;align-items:center;gap:6px;}
    .t-btn{
      width:28px;height:28px;border-radius:6px;border:1px solid var(--border);
      background:var(--bg);color:var(--white);font-family:var(--font-m);
      font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:all .12s;line-height:1;
    }
    .t-btn:hover{border-color:#444;background:var(--surface);}
    .t-btn:active{transform:scale(.92);}
    .t-val{font-size:.75rem;font-weight:700;color:var(--amber);min-width:50px;text-align:center;}
    .key-badge{padding:4px 10px;border-radius:5px;background:#1a1200;border:1px solid #332200;color:var(--amber);font-size:.65rem;font-weight:700;}
    .capo-info{font-size:.6rem;color:var(--dim);}

    /* LYRICS */
    .lyrics-wrap{padding:32px 24px 80px;max-width:760px;margin:0 auto;overflow-x:auto;}
    .lyrics-block{display:flex;flex-direction:column;gap:0;}
    .chord-lyric-pair{display:flex;flex-direction:column;margin-bottom:0;}
    .chord-row{
      font-family:var(--font-m);font-size:clamp(.75rem,2.2vw,.95rem);
      font-weight:700;color:var(--amber);white-space:pre;
      line-height:1.6;letter-spacing:0;
    }
    .chord-row.hidden{display:none;}
    .lyric-row{
      font-family:var(--font-d);font-size:clamp(1.3rem,3.5vw,1.75rem);
      font-weight:300;color:#ffffff;white-space:pre;
      line-height:1.5;margin-bottom:6px;
    }
    .lyric-spacer{height:1rem;}
    .chord-inline{color:var(--amber);font-family:var(--font-m);font-size:.65em;font-weight:700;margin-right:2px;}
    .section-tag{
      font-family:var(--font-m);font-size:.6rem;
      letter-spacing:.3em;color:var(--dim);text-transform:uppercase;
      margin:28px 0 8px;display:block;
    }
    .empty-lyrics{text-align:center;padding:80px 24px;font-family:var(--font-d);font-size:1.4rem;font-style:italic;color:var(--dim);}
    .empty-hint{font-family:var(--font-m);font-size:.65rem;letter-spacing:.1em;color:#333;margin-top:12px;}

    /* ── EDITOR ── */
    #editor-page{display:none;}
    .editor-header{
      padding:16px 24px;border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:12px;position:sticky;top:0;
      background:rgba(22,22,22,.97);backdrop-filter:blur(12px);z-index:10;
    }
    .editor-body{max-width:720px;margin:0 auto;padding:28px 24px 80px;display:flex;flex-direction:column;gap:16px;}
    .field-group{display:flex;flex-direction:column;gap:6px;}
    .field-row{display:flex;gap:10px;}
    .field-label{font-size:.55rem;letter-spacing:.2em;color:#999;text-transform:uppercase;}
    .field-input{
      width:100%;padding:11px 14px;border-radius:8px;
      background:var(--surface);border:1px solid var(--border);
      color:#fff;font-family:var(--font-m);font-size:.9rem;
      outline:none;transition:border-color .2s;
    }
    .field-input:focus{border-color:#444;}
    .field-input.small{width:80px;}
    textarea.field-input{
      min-height:420px;resize:vertical;line-height:1.7;
      font-size:.85rem;font-family:var(--font-m);
    }
    .editor-hint{
      font-size:.6rem;color:#555;letter-spacing:.05em;line-height:1.6;
      background:#111;border:1px solid #222;border-radius:8px;padding:12px 14px;
    }
    .editor-hint code{color:var(--amber);font-family:var(--font-m);}
    .save-btn{
      padding:13px;border-radius:10px;border:none;
      background:#fff;color:#000;font-family:var(--font-m);
      font-size:.8rem;font-weight:700;letter-spacing:.1em;
      cursor:pointer;transition:all .15s;text-transform:uppercase;
    }
    .save-btn:hover{background:#ddd;}
    .save-btn:active{transform:scale(.98);}
    .export-btn{
      padding:10px 18px;border-radius:8px;border:1px solid var(--border);
      background:transparent;color:#aaa;font-family:var(--font-m);
      font-size:.7rem;cursor:pointer;transition:all .15s;letter-spacing:.05em;
    }
    .export-btn:hover{border-color:#555;color:#fff;}
    .toast{
      position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);
      background:#fff;color:#000;border-radius:20px;padding:10px 22px;
      font-size:.7rem;font-weight:700;letter-spacing:.1em;
      z-index:100;transition:transform .3s cubic-bezier(.34,1.56,.64,1);
      pointer-events:none;
    }
    .toast.show{transform:translateX(-50%) translateY(0);}
    /* Edit btn on song page */
    .edit-song-btn{
      padding:7px 14px;border-radius:8px;border:1px solid var(--border);
      background:transparent;color:#888;font-family:var(--font-m);
      font-size:.6rem;cursor:pointer;transition:all .15s;letter-spacing:.05em;flex-shrink:0;
    }
    .edit-song-btn:hover{border-color:#555;color:#fff;}

  </style>
</head>
<body>

<!-- HOME -->
<div id="home">
  <div class="site-header">
    <div class="site-title">Setlist</div>
    <div class="site-sub" style="color:#aaa;">Répertoire de chansons</div>
  </div>
  <div class="search-wrap">
    <input type="search" class="search-input" id="search" placeholder="Rechercher un titre, un artiste…" autocomplete="off" spellcheck="false">
  </div>
  <div class="stats" id="stats"></div>
  <div class="song-list" id="song-list"></div>
</div>


<!-- EDITOR PAGE -->
<div id="editor-page">
  <div class="editor-header">
    <button class="back-btn" id="editor-back">← Retour</button>
    <div style="flex:1;">
      <div style="font-size:1rem;font-weight:700;color:#fff;" id="editor-heading">Éditer la chanson</div>
      <div style="font-size:.55rem;letter-spacing:.15em;color:#666;text-transform:uppercase;">Les modifs sont sauvegardées localement</div>
    </div>
    <button class="export-btn" onclick="exportSongsJs()">⬇ Exporter songs.js</button>
  </div>
  <div class="editor-body">
    <div class="field-group">
      <div class="field-label">Titre</div>
      <input class="field-input" id="ed-title" type="text" placeholder="Titre de la chanson">
    </div>
    <div class="field-group">
      <div class="field-label">Artiste</div>
      <input class="field-input" id="ed-artist" type="text" placeholder="Artiste">
    </div>
    <div class="field-row">
      <div class="field-group" style="flex:1;">
        <div class="field-label">Tonalité</div>
        <input class="field-input" id="ed-key" type="text" placeholder="G, Am, F#…">
      </div>
      <div class="field-group">
        <div class="field-label">Capo</div>
        <input class="field-input small" id="ed-capo" type="number" min="0" max="12" placeholder="0">
      </div>
    </div>
    <div class="field-group">
      <div class="field-label">Paroles &amp; Accords</div>
      <textarea class="field-input" id="ed-lyrics" placeholder="{Verse}
[Am]Première ligne des [G]paroles
[F]Deuxième ligne

{Chorus}
[C]Refrain ici [G]comme ça"></textarea>
    </div>
    <div class="editor-hint">
      <code>[Am]</code> devant un mot = accord &nbsp;•&nbsp;
      <code>{Verse}</code> <code>{Chorus}</code> <code>{Bridge}</code> = sections &nbsp;•&nbsp;
      Ligne vide = espace entre strophes
    </div>
    <button class="save-btn" onclick="saveEdits()">💾 Sauvegarder</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<!-- SONG PAGE -->
<div id="song-page">
  <div class="song-header">
    <button class="back-btn" onclick="goHome()">← Retour</button>
    <div class="song-header-info">
      <div class="song-page-title" id="sp-title"></div>
      <div class="song-page-artist" id="sp-artist"></div>
    </div>
  </div>
  <div class="toolbar">
    <span class="tool-label">Accords</span>
    <button class="toggle-chords active" id="chord-toggle" onclick="toggleChords()">Visibles</button>
    <span class="tool-label" style="margin-left:8px;">Transposer</span>
    <div class="transpose-wrap">
      <button class="t-btn" onclick="transpose(-1)">−</button>
      <span class="t-val" id="t-val">Original</span>
      <button class="t-btn" onclick="transpose(+1)">+</button>
    </div>
    <span class="key-badge" id="sp-key"></span>
    <span class="capo-info" id="sp-capo"></span>
    <button class="edit-song-btn" onclick="openEditor(currentSongIdx)">✏ Éditer</button>
  </div>
  <div class="lyrics-wrap">
    <div class="lyrics-block" id="lyrics-block"></div>
  </div>
</div>

<script src="songs.js"></script>
<script>
// ── CHORD TRANSPOSITION ──
const SHARP_NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const FLAT_NOTES  = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
const ENHARMONIC  = {'C#':'Db','D#':'Eb','F#':'Gb','G#':'Ab','A#':'Bb','Db':'C#','Eb':'D#','Gb':'F#','Ab':'G#','Bb':'A#'};

function noteIndex(note) {
  let i = SHARP_NOTES.indexOf(note);
  if(i < 0) i = FLAT_NOTES.indexOf(note);
  return i;
}

function transposeChord(chord, semitones) {
  if(semitones === 0) return chord;
  // Match root + optional sharp/flat + optional minor/maj/dim/sus/aug/add/7 etc
  return chord.replace(/([A-G][b#]?)/g, (match) => {
    const idx = noteIndex(match);
    if(idx < 0) return match;
    const newIdx = ((idx + semitones) % 12 + 12) % 12;
    // Use flats if original used flats, else sharps
    const useFlat = FLAT_NOTES.includes(match) && !SHARP_NOTES.includes(match);
    return useFlat ? FLAT_NOTES[newIdx] : SHARP_NOTES[newIdx];
  });
}

// ── RENDER LYRICS ──
// Supports TWO formats:
// 1. Chord-over-lyrics: alternating chord line / lyric line (exact spacing preserved)
// 2. Inline: [Am]word — legacy format still supported
//
// A line is a "chord line" if it contains only chord tokens + whitespace
// Chord token = letter A-G + optional b/# + optional suffix (m,maj,min,dim,sus,aug,add,7,9,etc) + optional /bass

const CHORD_TOKEN_RE = /^[A-G][b#]?(?:maj|min|m|dim|aug|sus|add)?(?:\d+)?(?:\/[A-G][b#]?)?$/;

function isChordLine(line) {
  if(!line.trim()) return false;
  // Split on 2+ spaces or tab to get tokens, filter empty
  const tokens = line.trim().split(/\s{2,}|\t/).flatMap(t => t.trim().split(/\s+/)).filter(Boolean);
  if(tokens.length === 0) return false;
  return tokens.every(tok => CHORD_TOKEN_RE.test(tok.replace(/[()]/g,'')));
}

function transposeChordLine(line, semitones) {
  if(semitones === 0) return line;
  // Replace each chord token in place, preserving exact spacing
  return line.replace(/[A-G][b#]?(?:maj|min|m|dim|aug|sus|add)?(?:\d+)?(?:\/[A-G][b#]?)?/g, chord => {
    return transposeChord(chord, semitones);
  });
}

function renderLyrics(rawLyrics, semitones, showChords) {
  if(!rawLyrics || !rawLyrics.trim()) {
    return `<div class="empty-lyrics">Paroles à ajouter…<div class="empty-hint">Collez le texte avec accords dans l'éditeur</div></div>`;
  }

  let html = '';
  const lines = rawLyrics.split('\n');
  let i = 0;
  while(i < lines.length) {
    const line = lines[i];

    // Section tag {Verse} {Chorus} etc
    const secMatch = line.match(/^\{(.+)\}$/);
    if(secMatch) {
      html += `<div class="section-tag">${secMatch[1]}</div>`;
      i++; continue;
    }

    // Empty line → spacer
    if(!line.trim()) {
      html += `<div class="lyric-spacer"></div>`;
      i++; continue;
    }

    // Chord-over-lyrics format: chord line followed by lyric line
    if(isChordLine(line)) {
      const chordLine = transposeChordLine(line, semitones);
      const lyricLine = (i+1 < lines.length && !isChordLine(lines[i+1]) && lines[i+1].trim() && !lines[i+1].match(/^\{.+\}$/))
        ? lines[i+1] : '';
      if(lyricLine !== '') {
        html += `<div class="chord-lyric-pair">`;
        html += `<div class="chord-row${showChords?'':' hidden'}">${escHtml(chordLine)}</div>`;
        html += `<div class="lyric-row">${escHtml(lyricLine)}</div>`;
        html += `</div>`;
        i += 2;
      } else {
        // Chord line with no following lyric
        html += `<div class="chord-row${showChords?'':' hidden'}">${escHtml(chordLine)}</div>`;
        i++;
      }
      continue;
    }

    // Inline [Chord] format (legacy)
    if(line.includes('[')) {
      const parsedLine = line.replace(/\[([^\]]+)\]/g, (_, chord) => {
        const transposed = transposeChord(chord, semitones);
        return showChords ? `<span class="chord-inline">${escHtml(transposed)}</span>` : '';
      });
      html += `<div class="lyric-row">${parsedLine}</div>`;
      i++; continue;
    }

    // Plain lyric line
    html += `<div class="lyric-row">${escHtml(line)}</div>`;
    i++;
  }
  return html;
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── STATE ──
let currentSong = null;
let transposeVal = 0;
let chordsVisible = true;

// ── HOME ──
function buildList(filter='') {
  const list = document.getElementById('song-list');
  const stats = document.getElementById('stats');
  const q = filter.toLowerCase().trim();
  const filtered = q
    ? SONGS.filter(s => s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q))
    : SONGS;

  const withLyrics = SONGS.filter(s => s.lyrics && s.lyrics.trim()).length;
  stats.textContent = q
    ? `${filtered.length} résultat${filtered.length!==1?'s':''}  ·  ${SONGS.length} chansons  ·  ${withLyrics} avec paroles`
    : `${SONGS.length} chansons  ·  ${withLyrics} avec paroles`;

  if(filtered.length === 0) {
    list.innerHTML = `<div class="no-results">Aucun résultat pour "${filter}"</div>`;
    return;
  }

  list.innerHTML = filtered.map((s,i) => {
    const hasLyrics = s.lyrics && s.lyrics.trim();
    const keyHtml = s.key ? `<span class="song-key">${s.key}</span>` : '';
    const capoHtml = s.capo ? `<span class="song-capo">capo ${s.capo}</span>` : '';
    return `<div class="song-item" onclick="openSong(${SONGS.indexOf(s)})">
      <div class="song-left">
        <div class="song-title">${s.title}</div>
        ${s.artist ? `<div class="song-artist">${s.artist}</div>` : ''}
      </div>
      <div class="song-right">
        ${capoHtml}${keyHtml}
        <div class="song-status ${hasLyrics?'has-lyrics':''}"></div>
      </div>
    </div>`;
  }).join('');
}

// ── SONG PAGE ──
function openSong(idx) {
  currentSong = SONGS[idx];
  transposeVal = 0;
  chordsVisible = true;

  document.getElementById('home').style.display = 'none';
  document.getElementById('song-page').style.display = 'block';
  window.scrollTo(0,0);

  document.getElementById('sp-title').textContent = currentSong.title;
  document.getElementById('sp-artist').textContent = currentSong.artist || '';
  document.getElementById('sp-key').textContent = currentSong.key || '';
  document.getElementById('sp-capo').textContent = currentSong.capo ? `capo ${currentSong.capo}` : '';

  document.getElementById('chord-toggle').classList.add('active');
  document.getElementById('chord-toggle').textContent = 'Visibles';
  document.getElementById('t-val').textContent = 'Original';

  renderPage();
}

function renderPage() {
  const block = document.getElementById('lyrics-block');
  block.innerHTML = renderLyrics(currentSong.lyrics, transposeVal, chordsVisible);
  block.className = 'lyrics-block';

  // Update transposed key display
  const keySpan = document.getElementById('sp-key');
  if(currentSong.key && transposeVal !== 0) {
    keySpan.textContent = transposeChord(currentSong.key, transposeVal);
  } else {
    keySpan.textContent = currentSong.key || '';
  }
}

function toggleChords() {
  chordsVisible = !chordsVisible;
  const btn = document.getElementById('chord-toggle');
  btn.classList.toggle('active', chordsVisible);
  btn.textContent = chordsVisible ? 'Visibles' : 'Masqués';
  renderPage();
}

function transpose(delta) {
  transposeVal = ((transposeVal + delta) % 12 + 12) % 12;
  if(transposeVal > 6) transposeVal -= 12; // keep in -6..+6 range
  const label = transposeVal === 0 ? 'Original' : (transposeVal > 0 ? '+'+transposeVal : String(transposeVal));
  document.getElementById('t-val').textContent = label;
  renderPage();
}

function goHome() {
  document.getElementById('song-page').style.display = 'none';
  document.getElementById('home').style.display = 'block';
  currentSong = null;
}

// ── SEARCH ──
document.getElementById('search').addEventListener('input', e => buildList(e.target.value));

// ── KEYBOARD SHORTCUT ──
document.addEventListener('keydown', e => {
  if(e.key === 'Escape' && currentSong) goHome();
});

// ── PLACEHOLDER ALÉATOIRE ──
const placeholders = SONGS.map(s => s.title);
function shuffleArr(arr){ return [...arr].sort(()=>Math.random()-.5); }
let shuffled = shuffleArr(placeholders);
let pIdx = 0;
function rotatePlaceholder(){
  const input = document.getElementById('search');
  if(document.activeElement === input) return;
  input.placeholder = shuffled[pIdx % shuffled.length];
  pIdx++;
  if(pIdx % shuffled.length === 0) shuffled = shuffleArr(placeholders);
}
setInterval(rotatePlaceholder, 2200);
rotatePlaceholder();


// ── EDITOR ──
let currentSongIdx = null;
// Load overrides from localStorage
let localOverrides = {};
try { localOverrides = JSON.parse(localStorage.getItem('pedros_overrides')||'{}'); } catch(e){}

// Merge overrides into SONGS at runtime
function getMergedSong(idx){ return {...SONGS[idx], ...( localOverrides[idx]||{} )}; }

function openEditor(idx){
  currentSongIdx = idx;
  const s = getMergedSong(idx);
  document.getElementById('editor-heading').textContent = s.title;
  document.getElementById('ed-title').value  = s.title  || '';
  document.getElementById('ed-artist').value = s.artist || '';
  document.getElementById('ed-key').value    = s.key    || '';
  document.getElementById('ed-capo').value   = s.capo   || 0;
  document.getElementById('ed-lyrics').value = s.lyrics || '';

  document.getElementById('song-page').style.display  = 'none';
  document.getElementById('editor-page').style.display = 'block';
  window.scrollTo(0,0);
}

document.getElementById('editor-back').onclick = function(){
  document.getElementById('editor-page').style.display = 'none';
  document.getElementById('song-page').style.display   = 'block';
  window.scrollTo(0,0);
};

function saveEdits(){
  const idx = currentSongIdx;
  localOverrides[idx] = {
    title:  document.getElementById('ed-title').value.trim(),
    artist: document.getElementById('ed-artist').value.trim(),
    key:    document.getElementById('ed-key').value.trim(),
    capo:   parseInt(document.getElementById('ed-capo').value)||0,
    lyrics: document.getElementById('ed-lyrics').value,
  };
  localStorage.setItem('pedros_overrides', JSON.stringify(localOverrides));
  // Update currentSong so song page refreshes
  currentSong = getMergedSong(idx);
  showToast('✓ Sauvegardé !');
  setTimeout(()=>{
    document.getElementById('editor-page').style.display = 'none';
    document.getElementById('song-page').style.display   = 'block';
    renderPage();
    window.scrollTo(0,0);
  }, 800);
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

// Export all merged songs as songs.js
function exportSongsJs(){
  const lines = ['const SONGS = ['];
  SONGS.forEach((s, i)=>{
    const m = getMergedSong(i);
    const lyrics = (m.lyrics||'').replace(/`/g, '\`');
    lines.push('  { title: '+JSON.stringify(m.title)+', artist: '+JSON.stringify(m.artist||'')+', key: '+JSON.stringify(m.key||'')+', capo: '+(m.capo||0)+', lyrics: `'+lyrics+'` },');
  });
  lines.push('];');
  const blob = new Blob([lines.join('\n')], {type:'text/javascript'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'songs.js';
  a.click();
  showToast('⬇ songs.js téléchargé');
}

// Override openSong to use merged data
const _origOpenSong = openSong;
openSong = function(idx){
  currentSongIdx = idx;
  const merged = getMergedSong(idx);
  // Temporarily patch SONGS[idx] for renderPage
  const orig = SONGS[idx];
  SONGS[idx] = merged;
  _origOpenSong(idx);
  SONGS[idx] = orig;
  currentSong = merged;
};

// ── INIT ──
buildList();
</script>
